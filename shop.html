<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title></title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    :root{
      --vr-bg: radial-gradient(circle at top, #f6e7cf 0, #1b6688 62%, #03279e 100%);
      --vr-overlay: none;

      /* compact shop */
      --shop-card-r: 16px;
      --shop-card-pad: 12px;
      --shop-gap: 10px;
      --shop-icon: 54px;
      --shop-qty: 16px;
      --shop-btn-r: 14px;
      --shop-btn-h: 40px;

      /* cosmetics */
      --cos-card: 74px;
      --cos-r: 16px;
      --cos-gap: 10px;
      --cos-border: rgba(255,255,255,.10);
      --cos-bg: rgba(0,0,0,.18);
      --cos-bg2: rgba(0,0,0,.24);
      --cos-shadow: 0 14px 28px rgba(0,0,0,.28);
    }

    /* =========================
       TOPBAR (copié du settings qui marche)
    ========================= */
    .vr-header{
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display:block !important;
    }

    .vr-top-actions{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: calc(8px + env(safe-area-inset-top)) 12px 6px; /* ✅ moins haut */
    }

    .vr-top-slot{
      flex:1 1 0;
      display:flex;
      align-items:center;
    }

    .vr-top-left{ justify-content:flex-start; }
    .vr-top-center{ justify-content:center; }
    .vr-top-right{ justify-content:flex-end; }

    .vr-icon-button{
      width:44px;
      height:44px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.26);
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
    }

    .vr-icon-button:active{ transform: scale(.98); }

    .vr-icon-button img{
      width:30px;
      height:30px;
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65)) contrast(1.15) brightness(1.08);
    }

    .vr-back-ico{
      width:24px;
      height:24px;
      display:block;
      opacity:.98;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65));
    }

    /* =========================
       SHOP — compact + petits carrés
    ========================= */

    /* Titres centrés */
    .vr-section-title,
    .vr-profile-title{
      text-align:center !important;
      color: rgba(255,255,255,.96) !important;
      margin-left:auto !important;
      margin-right:auto !important;
    }

    /* ✅ réduit espace au-dessus de Boutique */
    #view-shop .vr-section-title{
      margin-top: 8px !important;
      margin-bottom: 10px !important;
    }

    /* Espacement sections (sans grosse card autour) */
    .vr-shop-block{
      margin: 8px 0 14px; /* ✅ plus compact */
    }

    /* grid 2 colonnes */
    .vr-shop-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--shop-gap);
    }

    /* petites cartes OFFRE */
    .vr-shop-item{
      position: relative;
      overflow: hidden;
      border-radius: var(--shop-card-r);
      padding: var(--shop-card-pad);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      box-shadow: 0 18px 34px rgba(0,0,0,.30);
    }

    .vr-shop-item::before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:
        radial-gradient(420px 180px at 20% 12%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(420px 220px at 75% 18%, rgba(255,59,59,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 45%);
      opacity:.9;
    }

    /* top line: icon + qty */
    .vr-shop-top{
      position: relative;
      z-index: 1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      min-height: 66px;  /* ✅ plus petit */
      margin-bottom: 10px;
    }

    .vr-shop-icon{
      width: var(--shop-icon);
      height: var(--shop-icon);
      max-width: var(--shop-icon);
      max-height: var(--shop-icon);
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,.55));
      user-select:none;
      pointer-events:none;
    }

    .vr-shop-qty{
      position: relative;
      z-index: 1;
      font-weight: 950;
      font-size: var(--shop-qty);
      letter-spacing: .2px;
      color: rgba(255,255,255,.96);
      text-shadow: 0 12px 24px rgba(0,0,0,.55);
      line-height: 1;
      text-align:right;
    }

    /* ✅ Boutons : texte BLANC + CENTRÉ */
    .vr-shop-item .vr-choice-button{
      position: relative;
      z-index: 1;
      width: 100%;
      border-radius: var(--shop-btn-r);
      padding: 10px 10px;
      min-height: var(--shop-btn-h);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);

      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;

      color: rgba(255,255,255,.96) !important;
    }

    .vr-shop-item .vr-choice-button span{
      color: inherit !important;
      opacity: 1 !important;
    }

    .vr-shop-item .vr-choice-button:active{
      transform: translateY(1px);
    }

    /* sécurité: aucune image ne peut dépasser */
    .vr-shop-item img,
    .vr-shop-item svg{
      max-width: 100%;
      height: auto;
    }

    /* No Ads + Diamond: image seule centrée */
    .vr-shop-item[data-sku="vrealms_no_ads"] .vr-shop-top,
    .vr-shop-item[data-sku="vrealms_diamond"] .vr-shop-top{
      justify-content: center;
    }

    /* Status align */
    #shop-status, #store-status{
      text-align:center;
      color: rgba(255,255,255,.86);
    }

    /* ✅ espace plus propre entre Store titre et contenu */
    .vr-profile-title{
      margin-top: 10px !important;
      margin-bottom: 10px !important;
    }

    /* =========================
       COSMETICS — sous Store
       Structure demandée:
       Store
       Enfers
         Fond (scroll)
         Carte message (scroll)
         Choix (scroll)
       Paradis ...
    ========================= */

    .vr-cosmetics{
      margin-top: 10px;
      display:flex;
      flex-direction:column;
      gap: 16px;
    }

    .vr-universe-block{
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      border-radius: 18px;
      padding: 12px 12px 10px;
      box-shadow: 0 18px 34px rgba(0,0,0,.26);
      overflow:hidden;
      position:relative;
    }

    .vr-universe-block::before{
      content:"";
      position:absolute;
      inset:-2px;
      pointer-events:none;
      background:
        radial-gradient(520px 220px at 15% 12%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(520px 260px at 85% 18%, rgba(255,214,156,.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%);
      opacity:.9;
    }

    .vr-universe-title{
      position:relative;
      z-index:1;
      text-align:center;
      font-weight: 950;
      font-size: 18px;
      letter-spacing:.2px;
      color: rgba(255,255,255,.96);
      margin: 2px 0 10px;
      text-shadow: 0 12px 24px rgba(0,0,0,.55);
    }

    .vr-cos-row{
      position:relative;
      z-index:1;
      margin: 10px 0 12px;
    }

    .vr-cos-row:last-child{
      margin-bottom: 6px;
    }

    .vr-cos-subtitle{
      text-align:center;
      font-weight: 900;
      font-size: 13px;
      color: rgba(255,255,255,.92);
      margin: 0 0 8px;
      letter-spacing:.15px;
      opacity:.95;
    }

    .vr-cos-scroll{
      display:flex;
      gap: var(--cos-gap);
      overflow-x:auto;
      padding: 2px 2px 6px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }

    .vr-cos-scroll::-webkit-scrollbar{ display:none; }

    .vr-cos-card{
      flex: 0 0 auto;
      width: var(--cos-card);
      height: var(--cos-card);
      border-radius: var(--cos-r);
      border: 1px solid var(--cos-border);
      background: var(--cos-bg2);
      box-shadow: var(--cos-shadow);
      position:relative;
      overflow:hidden;
      scroll-snap-align: start;
      cursor:pointer;
    }

    .vr-cos-card::before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:
        radial-gradient(160px 80px at 20% 18%, rgba(255,255,255,.10), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 55%);
      opacity:.95;
    }

    .vr-cos-thumb{
      position:absolute;
      inset: 0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 10px;
      z-index:1;
    }

    .vr-cos-thumb img{
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 14px 18px rgba(0,0,0,.55));
      user-select:none;
      pointer-events:none;
    }

    .vr-cos-price{
      position:absolute;
      right: 6px;
      bottom: 6px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.30);
      box-shadow: 0 10px 18px rgba(0,0,0,.22);
      font-weight: 950;
      font-size: 12px;
      color: rgba(255,255,255,.96);
      line-height:1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .vr-cos-price img{
      width: 16px;
      height: 16px;
      object-fit: contain;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.55));
    }

    /* ✅ petits écrans: cartes encore plus compactes */
    @media (max-width: 380px){
      :root{
        --shop-card-pad: 11px;
        --shop-gap: 9px;
        --shop-icon: 50px;
        --shop-qty: 15px;
        --cos-card: 70px;
      }
    }
  </style>
</head>

<body class="vr-body page-shop" data-page="shop">

  <!-- ✅ HEADER complet : retour index + profil -->
  <header class="vr-header" aria-label="" data-i18n-aria="shop.aria_top">
    <div class="vr-top-actions">
      <div class="vr-top-slot vr-top-left">
        <a id="btn-back" class="vr-icon-button" href="index.html" aria-label="" data-i18n-aria="common.back">
          <svg class="vr-back-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="white" d="M15.5 5.5a1 1 0 0 1 0 1.4L10.4 12l5.1 5.1a1 1 0 1 1-1.4 1.4l-5.8-5.8a1.2 1.2 0 0 1 0-1.4l5.8-5.8a1 1 0 0 1 1.4 0z"/>
          </svg>
        </a>
      </div>

      <div class="vr-top-slot vr-top-center"></div>

      <div class="vr-top-slot vr-top-right">
        <a id="btn-profile" class="vr-icon-button" href="profile.html" aria-label="" data-i18n-aria="shop.aria_profile">
          <img src="assets/img/ui/btn_profile.webp" alt="" draggable="false" />
        </a>
      </div>
    </div>
  </header>

  <main class="vr-main">
    <section id="view-shop" class="vr-view vr-view-active">

      <!-- ✅ BOUTIQUE centré -->
      <h2 class="vr-section-title" data-i18n="shop.title"></h2>

      <!-- ✅ Rewarded (SANS gros encadré) -->
      <div class="vr-shop-block">
        <div class="vr-shop-grid" id="reward-grid">

          <div class="vr-shop-item">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.reward_jeton_x1"></div>
            </div>
            <button class="vr-choice-button" id="btn-reward-jeton" type="button">
              <span data-i18n="shop.watch"></span>
            </button>
          </div>

          <div class="vr-shop-item">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.reward_vcoins_x100"></div>
            </div>
            <button class="vr-choice-button" id="btn-reward-coins" type="button">
              <span data-i18n="shop.watch"></span>
            </button>
          </div>

        </div>

        <p class="vr-profile-text" id="shop-status" style="opacity:.9;margin-top:10px;"></p>
      </div>

      <!-- ✅ STORE centré -->
      <h3 class="vr-profile-title" data-i18n="shop.store_title"></h3>

      <!-- ✅ STORE packs (SANS gros encadré) -->
      <div class="vr-shop-block">
        <div class="vr-shop-grid" id="store-grid">

          <div class="vr-shop-item" data-sku="vrealms_jetons_12">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_jetons_12"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_jetons_12">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_jetons_30">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_jetons_30"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_jetons_30">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_vcoins_500">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_vcoins_500"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_vcoins_500">
              <span class="vr-iap-label" data-i18n="shop.unavailable"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_vcoins_3000">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_vcoins_3000"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_vcoins_3000">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_no_ads">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/noads.webp" alt="" draggable="false">
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_no_ads">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_diamond">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/diamond.webp" alt="" draggable="false">
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_diamond">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

        </div>

        <p class="vr-profile-text" id="store-status" style="opacity:.9;margin-top:10px;"></p>

        <!-- ✅ NOUVEAU : Personnalisation par univers (placeholders) -->
        <div class="vr-cosmetics" id="cosmetics-block">

          <!-- ENFERS -->
          <div class="vr-universe-block" data-universe="hell_king">
            <div class="vr-universe-title" data-i18n="shop.universe.hell">Enfers</div>

            <div class="vr-cos-row" data-category="background">
              <div class="vr-cos-subtitle" data-i18n="shop.cosmetics.background">Fond</div>
              <div class="vr-cos-scroll">
                <div class="vr-cos-card" data-item="hell_bg_01">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>250</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_bg_02">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>400</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_bg_03">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>650</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_bg_04">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>900</span></div>
                </div>
              </div>
            </div>

            <div class="vr-cos-row" data-category="message">
              <div class="vr-cos-subtitle" data-i18n="shop.cosmetics.message">Carte message</div>
              <div class="vr-cos-scroll">
                <div class="vr-cos-card" data-item="hell_msg_01">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_card.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>200</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_msg_02">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_card.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>350</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_msg_03">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_card.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>550</span></div>
                </div>
              </div>
            </div>

            <div class="vr-cos-row" data-category="choice">
              <div class="vr-cos-subtitle" data-i18n="shop.cosmetics.choice">Choix</div>
              <div class="vr-cos-scroll">
                <div class="vr-cos-card" data-item="hell_choice_01">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_choice.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>150</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_choice_02">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_choice.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>250</span></div>
                </div>
                <div class="vr-cos-card" data-item="hell_choice_03">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_choice.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>400</span></div>
                </div>
              </div>
            </div>
          </div>

          <!-- PARADIS -->
          <div class="vr-universe-block" data-universe="heaven_king">
            <div class="vr-universe-title" data-i18n="shop.universe.heaven">Paradis</div>

            <div class="vr-cos-row" data-category="background">
              <div class="vr-cos-subtitle" data-i18n="shop.cosmetics.background">Fond</div>
              <div class="vr-cos-scroll">
                <div class="vr-cos-card" data-item="heaven_bg_01">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>250</span></div>
                </div>
                <div class="vr-cos-card" data-item="heaven_bg_02">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>450</span></div>
                </div>
                <div class="vr-cos-card" data-item="heaven_bg_03">
                  <div class="vr-cos-thumb"><img src="assets/img/ui/placeholder_bg.webp" alt="" draggable="false"></div>
                  <div class="vr-cos-price"><img src="assets/img/ui/vcoins.webp" alt="" draggable="false"><span>700</span></div>
                </div>
              </div>
            </div>

            <div class="vr-cos-row" data-category="message">
              <div class="vr-cos-subtitle" data-i18n="shop.cosmetics.message">Carte message</div>
              <div class="vr-cos-scroll">

  <script>
    (function () {
      async function ensureBootstrap() {
        if (window.__vr_bootstrap_ready) return;
        try {
          if (typeof window.bootstrapAuthAndProfile === "function") {
            await window.bootstrapAuthAndProfile();
          }
        } catch (_) {}
        window.__vr_bootstrap_ready = true;
      }

      ensureBootstrap();

      window.vrWaitBootstrap = async function () {
        if (window.__vr_bootstrap_ready) return true;
        var t0 = Date.now();
        while (!window.__vr_bootstrap_ready && (Date.now() - t0) < 3000) {
          await new Promise(function (r) { setTimeout(r, 50); });
        }
        return !!window.__vr_bootstrap_ready;
      };
    })();
  </script>
