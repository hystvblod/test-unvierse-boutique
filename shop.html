<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title></title>
  <link rel="stylesheet" href="css/style.css" />

  <style>
    :root{
      --vr-bg: radial-gradient(circle at top, #f6e7cf 0, #1b6688 62%, #03279e 100%);
      --vr-overlay: none;

      --shop-gap: 10px;
      --shop-item-radius: 18px;
      --shop-item-pad: 12px;
      --shop-icon: 54px;
      --shop-btn-h: 42px;

      --u-gap: 14px;
      --u-radius: 20px;

      --cos-row-gap: 10px;
      --cos-arrow: 38px;
      --cos-card-r: 18px;
      --cos-card-h: 118px;
    }

    /* =========================
       TOPBAR
    ========================= */
    .vr-header{
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display:block !important;
    }

    .vr-top-actions{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: calc(8px + env(safe-area-inset-top)) 12px 6px;
    }

    .vr-top-slot{
      flex:1 1 0;
      display:flex;
      align-items:center;
    }

    .vr-top-left{ justify-content:flex-start; }
    .vr-top-center{ justify-content:center; }
    .vr-top-right{ justify-content:flex-end; }

    .vr-icon-button{
      width:44px;
      height:44px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.26);
      box-shadow: 0 10px 22px rgba(0,0,0,0.22);
      padding:0;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      text-decoration:none;
      -webkit-tap-highlight-color: transparent;
    }

    .vr-icon-button:active{ transform: scale(.98); }

    .vr-icon-button img{
      width:30px;
      height:30px;
      object-fit:contain;
      display:block;
      pointer-events:none;
      user-select:none;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65)) contrast(1.15) brightness(1.08);
    }

    .vr-back-ico{
      width:24px;
      height:24px;
      display:block;
      opacity:.98;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.65));
    }

    /* =========================
       TITRES
    ========================= */
    .vr-section-title,
    .vr-profile-title{
      text-align:center !important;
      color: rgba(255,255,255,.96) !important;
      margin-left:auto !important;
      margin-right:auto !important;
    }

    #view-shop .vr-section-title{
      margin-top: 4px !important;
      margin-bottom: 10px !important;
    }

    .vr-profile-title{
      margin-top: 10px !important;
      margin-bottom: 10px !important;
    }

    /* =========================
       SHOP / STORE ACTUEL
    ========================= */
    .vr-shop-block{
      margin: 8px 0 12px;
    }

    .vr-shop-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--shop-gap);
    }

    .vr-shop-item{
      position: relative;
      overflow: hidden;
      border-radius: var(--shop-item-radius);
      padding: var(--shop-item-pad);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      box-shadow: 0 18px 34px rgba(0,0,0,.30);
    }

    .vr-shop-item::before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:
        radial-gradient(420px 180px at 20% 12%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(420px 220px at 75% 18%, rgba(255,59,59,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.04), transparent 45%);
      opacity:.9;
    }

    .vr-shop-top{
      position: relative;
      z-index: 1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      min-height: 64px;
      margin-bottom: 10px;
    }

    .vr-shop-icon{
      width: var(--shop-icon);
      height: var(--shop-icon);
      max-width: var(--shop-icon);
      max-height: var(--shop-icon);
      object-fit: contain;
      flex: 0 0 auto;
      filter: drop-shadow(0 16px 26px rgba(0,0,0,.55));
      user-select:none;
      pointer-events:none;
    }

    .vr-shop-qty{
      position: relative;
      z-index: 1;
      font-weight: 950;
      font-size: 18px;
      letter-spacing: .2px;
      color: rgba(255,255,255,.96);
      text-shadow: 0 12px 24px rgba(0,0,0,.55);
      line-height: 1;
      text-align:right;
    }

    .vr-shop-item .vr-choice-button{
      position: relative;
      z-index: 1;
      width: 100%;
      border-radius: 14px;
      padding: 10px 10px;
      min-height: var(--shop-btn-h);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      box-shadow: 0 10px 22px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      color: rgba(255,255,255,.96) !important;
    }

    .vr-shop-item .vr-choice-button span{
      color: inherit !important;
      opacity: 1 !important;
    }

    .vr-shop-item .vr-choice-button:active{
      transform: translateY(1px);
    }

    .vr-shop-item img,
    .vr-shop-item svg{
      max-width: 100%;
      height: auto;
    }

    .vr-shop-item[data-sku="vrealms_no_ads"] .vr-shop-top,
    .vr-shop-item[data-sku="vrealms_diamond"] .vr-shop-top{
      justify-content: center;
    }

    /* ✅ on garde les statuts pour compat, mais invisibles */
    #shop-status,
    #store-status{
      display:none !important;
    }

    /* =========================
       COSMETICS SOUS STORE
    ========================= */
    .vr-cosmetics{
      display:flex;
      flex-direction:column;
      gap: var(--u-gap);
      margin-top: 14px;
      padding-bottom: 10px;
    }

    .vr-universe-block{
      position:relative;
      overflow:hidden;
      border-radius: var(--u-radius);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.18);
      box-shadow: 0 18px 34px rgba(0,0,0,.26);
      padding: 14px 12px 12px;
    }

    .vr-universe-block::before{
      content:"";
      position:absolute;
      inset:-2px;
      pointer-events:none;
      background:
        radial-gradient(520px 220px at 15% 12%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(520px 260px at 85% 18%, rgba(255,214,156,.08), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%);
      opacity:.9;
    }

    .vr-universe-title{
      position:relative;
      z-index:1;
      text-align:center;
      font-weight:950;
      font-size: 19px;
      line-height:1.1;
      color: rgba(255,255,255,.96);
      margin: 0 0 12px;
      text-shadow: 0 12px 24px rgba(0,0,0,.55);
    }

    .vr-cos-row{
      position:relative;
      z-index:1;
      margin: 0 0 14px;
    }

    .vr-cos-row:last-child{
      margin-bottom: 0;
    }

    .vr-cos-subtitle{
      text-align:center;
      font-weight:900;
      font-size:13px;
      color: rgba(255,255,255,.92);
      margin: 0 0 8px;
      letter-spacing:.15px;
    }

    .vr-cos-carousel{
      display:grid;
      grid-template-columns: var(--cos-arrow) minmax(0, 1fr) var(--cos-arrow);
      align-items:center;
      gap: 8px;
    }

    .vr-cos-arrow{
      width: var(--cos-arrow);
      height: var(--cos-arrow);
      border-radius:999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      box-shadow: 0 10px 18px rgba(0,0,0,.22);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      padding:0;
      color: rgba(255,255,255,.96);
      font-size: 18px;
      font-weight: 900;
      line-height:1;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }

    .vr-cos-arrow:active{
      transform: scale(.97);
    }

    .vr-cos-arrow[disabled]{
      opacity:.42;
      cursor:default;
    }

    .vr-cos-viewport{
      min-width:0;
      overflow:hidden;
      touch-action: pan-y;
    }

    .vr-cos-track{
      display:flex;
      transition: transform .24s ease;
      will-change: transform;
    }

    .vr-cos-slide{
      min-width:100%;
      width:100%;
      box-sizing:border-box;
    }

    .vr-cos-card{
      position:relative;
      overflow:hidden;
      border-radius: var(--cos-card-r);
      height: var(--cos-card-h);
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.24);
      box-shadow: 0 16px 28px rgba(0,0,0,.28);
    }

    .vr-cos-card::before{
      content:"";
      position:absolute;
      inset:-1px;
      pointer-events:none;
      background:
        radial-gradient(260px 120px at 18% 12%, rgba(255,255,255,.10), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.05), transparent 55%);
      opacity:.95;
      z-index:1;
    }

    .vr-cos-card img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit: cover;
      display:block;
      z-index:0;
      user-select:none;
      pointer-events:none;
    }

    .vr-cos-card.is-ui img{
      object-fit: contain;
      padding: 14px;
      background:
        radial-gradient(circle at 50% 40%, rgba(255,255,255,.10), transparent 46%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.08));
    }

    .vr-cos-overlay{
      position:absolute;
      inset:auto 0 0 0;
      z-index:2;
      padding: 28px 10px 10px;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.68));
    }

    .vr-cos-name{
      text-align:center;
      font-weight:900;
      font-size:13px;
      color: rgba(255,255,255,.96);
      line-height:1.15;
      margin-bottom: 8px;
      text-shadow: 0 8px 18px rgba(0,0,0,.45);
    }

    .vr-cos-bottom{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 8px;
    }

    .vr-cos-price{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.30);
      box-shadow: 0 10px 18px rgba(0,0,0,.22);
      color: rgba(255,255,255,.96);
      font-weight:950;
      font-size:12px;
      line-height:1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .vr-cos-price img{
      position:static;
      width:16px;
      height:16px;
      object-fit:contain;
      padding:0;
      background:none;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.45));
    }

    .vr-cos-count{
      color: rgba(255,255,255,.86);
      font-size:12px;
      font-weight:900;
      text-shadow: 0 8px 18px rgba(0,0,0,.45);
    }

    .vr-cos-dots{
      display:flex;
      justify-content:center;
      gap:6px;
      margin-top: 8px;
    }

    .vr-cos-dot{
      width:7px;
      height:7px;
      border-radius:999px;
      background: rgba(255,255,255,.28);
      box-shadow: 0 4px 10px rgba(0,0,0,.22);
    }

    .vr-cos-dot.active{
      background: rgba(255,255,255,.92);
    }

    @media (max-width: 390px){
      :root{
        --shop-icon: 50px;
        --cos-card-h: 110px;
        --cos-arrow: 36px;
      }
    }
  </style>
</head>

<body class="vr-body page-shop" data-page="shop">

  <header class="vr-header" aria-label="" data-i18n-aria="shop.aria_top">
    <div class="vr-top-actions">
      <div class="vr-top-slot vr-top-left">
        <a id="btn-back" class="vr-icon-button" href="index.html" aria-label="" data-i18n-aria="common.back">
          <svg class="vr-back-ico" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path fill="white" d="M15.5 5.5a1 1 0 0 1 0 1.4L10.4 12l5.1 5.1a1 1 0 1 1-1.4 1.4l-5.8-5.8a1.2 1.2 0 0 1 0-1.4l5.8-5.8a1 1 0 0 1 1.4 0z"/>
          </svg>
        </a>
      </div>

      <div class="vr-top-slot vr-top-center"></div>

      <div class="vr-top-slot vr-top-right">
        <a id="btn-profile" class="vr-icon-button" href="profile.html" aria-label="" data-i18n-aria="shop.aria_profile">
          <img src="assets/img/ui/btn_profile.webp" alt="" draggable="false" />
        </a>
      </div>
    </div>
  </header>

  <main class="vr-main">
    <section id="view-shop" class="vr-view vr-view-active">

      <h2 class="vr-section-title" data-i18n="shop.title"></h2>

      <div class="vr-shop-block">
        <div class="vr-shop-grid" id="reward-grid">

          <div class="vr-shop-item">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.reward_jeton_x1"></div>
            </div>
            <button class="vr-choice-button" id="btn-reward-jeton" type="button">
              <span data-i18n="shop.watch"></span>
            </button>
          </div>

          <div class="vr-shop-item">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.reward_vcoins_x100"></div>
            </div>
            <button class="vr-choice-button" id="btn-reward-coins" type="button">
              <span data-i18n="shop.watch"></span>
            </button>
          </div>

        </div>

        <p class="vr-profile-text" id="shop-status"></p>
      </div>

      <h3 class="vr-profile-title" data-i18n="shop.store_title"></h3>

      <div class="vr-shop-block">
        <div class="vr-shop-grid" id="store-grid">

          <div class="vr-shop-item" data-sku="vrealms_jetons_12">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_jetons_12"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_jetons_12">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_jetons_30">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/jeton.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_jetons_30"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_jetons_30">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_vcoins_500">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_vcoins_500"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_vcoins_500">
              <span class="vr-iap-label" data-i18n="shop.unavailable"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_vcoins_3000">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/vcoins.webp" alt="" draggable="false">
              <div class="vr-shop-qty" data-i18n="shop.pack_vcoins_3000"></div>
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_vcoins_3000">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_no_ads">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/noads.webp" alt="" draggable="false">
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_no_ads">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

          <div class="vr-shop-item" data-sku="vrealms_diamond">
            <div class="vr-shop-top">
              <img class="vr-shop-icon" src="assets/img/ui/diamond.webp" alt="" draggable="false">
            </div>
            <button class="vr-choice-button vr-iap-button" type="button" data-iap="vrealms_diamond">
              <span class="vr-iap-label" data-i18n="shop.loading"></span>
            </button>
          </div>

        </div>

        <p class="vr-profile-text" id="store-status"></p>

        <div class="vr-cosmetics" id="cosmetics-block"></div>
      </div>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabaseBootstrap.js"></script>

  <script>
    (function () {
      async function ensureBootstrap() {
        if (window.__vr_bootstrap_ready) return;
        try {
          if (typeof window.bootstrapAuthAndProfile === "function") {
            await window.bootstrapAuthAndProfile();
          }
        } catch (_) {}
        window.__vr_bootstrap_ready = true;
      }

      ensureBootstrap();

      window.vrWaitBootstrap = async function () {
        if (window.__vr_bootstrap_ready) return true;
        var t0 = Date.now();
        while (!window.__vr_bootstrap_ready && (Date.now() - t0) < 3000) {
          await new Promise(function (r) { setTimeout(r, 50); });
        }
        return !!window.__vr_bootstrap_ready;
      };
    })();
  </script>

  <script src="js/userData.js"></script>
  <script src="js/ads.js"></script>
  <script src="js/purchases.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/i18n.js"></script>
</body>
</html>
